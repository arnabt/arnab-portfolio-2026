<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Vectors Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import map for modern ESM imports -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Activity, Clock, Calendar, BarChart2, CheckCircle, 
      XCircle, Plus, Trash2, TrendingUp, Zap, BookOpen 
    } from 'lucide-react';

    // --- CONSTANTS & CONFIG ---
    const VECTORS = {
      Creavity: { min: 70, max: 90, color: 'bg-indigo-500', text: 'text-indigo-600', bgLight: 'bg-indigo-50', icon: Zap },
      Network: { min: 20, max: 30, color: 'bg-blue-500', text: 'text-blue-600', bgLight: 'bg-blue-50', icon: Activity },
      Shipping: { min: 20, max: 30, color: 'bg-amber-500', text: 'text-amber-600', bgLight: 'bg-amber-50', icon: TrendingUp },
      Gym: { min: 60, max: 60, color: 'bg-rose-500', text: 'text-rose-600', bgLight: 'bg-rose-50', icon: Activity },
      Journaling: { min: 15, max: 30, color: 'bg-purple-500', text: 'text-purple-600', bgLight: 'bg-purple-50', icon: BookOpen },
    };

    const DAILY_TARGET_MIN = 185;
    const WEEKLY_TARGET = 1200;

    // --- HELPER FUNCTIONS ---
    const calculateDuration = (start, end) => {
      if (!start || !end) return 0;
      const [startH, startM] = start.split(':').map(Number);
      const [endH, endM] = end.split(':').map(Number);
      let duration = (endH * 60 + endM) - (startH * 60 + startM);
      if (duration < 0) duration += 24 * 60; // Handle overnight
      return duration;
    };

    const getTodayString = () => '2026-04-12';

    const getWeekNumber = (dateString) => {
      const start = new Date("2026-04-13");
      const current = new Date(dateString);
      const diffTime = current - start;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return 0; // Pre-tracker
      return Math.floor(diffDays / 7) + 1;
    };

    // --- MOCK DATA ---
    const initialEntries = [
      { id: 1, date: '2026-04-10', vector: 'Creavity', activity: 'Client block', duration: 80 },
      { id: 2, date: '2026-04-10', vector: 'Network', activity: 'Event', duration: 40 },
      { id: 3, date: '2026-04-10', vector: 'Shipping', activity: 'Deploy', duration: 60 },
      { id: 4, date: '2026-04-10', vector: 'Gym', activity: 'Cardio', duration: 45 },
      
      { id: 5, date: '2026-04-11', vector: 'Creavity', activity: 'Deliverables', duration: 60 },
      { id: 6, date: '2026-04-11', vector: 'Shipping', activity: 'Code Review', duration: 30 },
      { id: 7, date: '2026-04-11', vector: 'Gym', activity: 'Strength', duration: 60 },
      { id: 12, date: '2026-04-11', vector: 'Journaling', activity: 'Evening reflection', duration: 15 },
      
      { id: 8, date: '2026-04-12', vector: 'Creavity', activity: 'Client block', startTime: '09:00', endTime: '10:30', duration: 90 },
      { id: 9, date: '2026-04-12', vector: 'Network', activity: 'Outreach call', startTime: '11:00', endTime: '11:30', duration: 30 },
      { id: 10, date: '2026-04-12', vector: 'Shipping', activity: 'Build feature', startTime: '14:00', endTime: '15:30', duration: 90 },
      { id: 11, date: '2026-04-12', vector: 'Gym', activity: 'Strength session', startTime: '18:00', endTime: '19:00', duration: 60 },
    ];

    // --- MAIN COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('today');
      
      // Initialize state from LocalStorage, falling back to initialEntries
      const [entries, setEntries] = useState(() => {
        const saved = localStorage.getItem('fiveVectorsEntries');
        if (saved) {
          try {
            return JSON.parse(saved);
          } catch (e) {
            console.error("Failed to parse saved entries.");
          }
        }
        return initialEntries;
      });

      // Save to localStorage whenever entries change
      useEffect(() => {
        localStorage.setItem('fiveVectorsEntries', JSON.stringify(entries));
      }, [entries]);

      const [currentDate, setCurrentDate] = useState(getTodayString());

      // Form State
      const [newVector, setNewVector] = useState('Creavity');
      const [newActivity, setNewActivity] = useState('');
      const [newStart, setNewStart] = useState('');
      const [newEnd, setNewEnd] = useState('');

      // --- DATA PROCESSING ---
      const todayEntries = entries.filter(e => e.date === currentDate);
      
      const dailyTotals = useMemo(() => {
        const totals = {};
        entries.forEach(entry => {
          if (!totals[entry.date]) {
            totals[entry.date] = { date: entry.date, Creavity: 0, Network: 0, Shipping: 0, Gym: 0, Journaling: 0, Total: 0 };
          }
          totals[entry.date][entry.vector] += entry.duration;
          totals[entry.date].Total += entry.duration;
        });
        return Object.values(totals).sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [entries]);

      const todayStats = dailyTotals.find(d => d.date === currentDate) || { Creavity: 0, Network: 0, Shipping: 0, Gym: 0, Journaling: 0, Total: 0 };

      const weeklyTotals = useMemo(() => {
        const weeks = {};
        dailyTotals.forEach(day => {
          const wk = getWeekNumber(day.date);
          if (!weeks[wk]) {
            weeks[wk] = { week: wk, Creavity: 0, Network: 0, Shipping: 0, Gym: 0, Journaling: 0, Total: 0, daysCount: 0 };
          }
          weeks[wk].Creavity += day.Creavity;
          weeks[wk].Network += day.Network;
          weeks[wk].Shipping += day.Shipping;
          weeks[wk].Gym += day.Gym;
          weeks[wk].Journaling += day.Journaling;
          weeks[wk].Total += day.Total;
          weeks[wk].daysCount += 1;
        });
        
        return Object.values(weeks).sort((a, b) => b.week - a.week).map((wk, index, arr) => {
          const prevWk = arr[index + 1];
          const vsLast = prevWk ? wk.Total - prevWk.Total : 0;
          const pctChange = prevWk && prevWk.Total > 0 ? ((vsLast / prevWk.Total) * 100).toFixed(1) : 0;
          return { ...wk, vsLast, pctChange };
        });
      }, [dailyTotals]);

      // --- HANDLERS ---
      const handleAddEntry = (e) => {
        e.preventDefault();
        const duration = calculateDuration(newStart, newEnd);
        if (duration <= 0) {
          alert("Please enter a valid time range.");
          return;
        }
        
        const entry = {
          id: Date.now(),
          date: currentDate,
          vector: newVector,
          activity: newActivity || 'Logged Session',
          startTime: newStart,
          endTime: newEnd,
          duration
        };

        setEntries([...entries, entry]);
        setNewActivity('');
        setNewStart('');
        setNewEnd('');
      };

      const handleDelete = (id) => {
        setEntries(entries.filter(e => e.id !== id));
      };

      // --- UI COMPONENTS ---
      const ProgressBar = ({ current, minTarget, color }) => {
        const percentage = Math.min((current / minTarget) * 100, 100) || 0;
        return (
          <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden mt-2">
            <div 
              className={`h-full ${color} transition-all duration-500`} 
              style={{ width: `${percentage}%` }}
            />
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          {/* HEADER */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-2">
                <Zap className="h-6 w-6 text-indigo-600" />
                <h1 className="text-xl font-bold text-slate-900 tracking-tight">Five Vectors</h1>
              </div>
              <div className="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                1 Min = 1 Point
              </div>
            </div>
            
            {/* TABS */}
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex space-x-6">
              {[
                { id: 'today', icon: Clock, label: "Today's Log" },
                { id: 'daily', icon: Calendar, label: 'Daily History' },
                { id: 'weekly', icon: BarChart2, label: 'Weekly Summary' }
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex items-center space-x-2 py-3 border-b-2 font-medium text-sm transition-colors ${
                    activeTab === tab.id 
                      ? 'border-indigo-600 text-indigo-600' 
                      : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'
                  }`}
                >
                  <tab.icon className="h-4 w-4" />
                  <span>{tab.label}</span>
                </button>
              ))}
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            
            {/* TODAY'S LOG VIEW */}
            {activeTab === 'today' && (
              <div className="space-y-8">
                <div className="flex justify-between items-end">
                  <div>
                    <h2 className="text-2xl font-bold text-slate-900">Today's Progress</h2>
                    <p className="text-slate-500 mt-1">Date: {currentDate}</p>
                  </div>
                  <div className="text-right">
                    <div className="text-3xl font-bold text-slate-900">{todayStats.Total} <span className="text-lg text-slate-500 font-normal">pts</span></div>
                    <div className="text-sm text-slate-500">Target: {DAILY_TARGET_MIN}</div>
                  </div>
                </div>

                {/* VECTOR CARDS */}
                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                  {Object.entries(VECTORS).map(([name, config]) => {
                    const current = todayStats[name];
                    const hit = current >= config.min;
                    const Icon = config.icon;
                    
                    return (
                      <div key={name} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <div className="flex justify-between items-start mb-2">
                          <div className={`p-2 rounded-lg ${config.bgLight}`}>
                            <Icon className={`h-5 w-5 ${config.text}`} />
                          </div>
                          {hit ? (
                            <CheckCircle className="h-5 w-5 text-emerald-500" />
                          ) : (
                            <span className="text-xs font-medium text-slate-400">{config.min} min target</span>
                          )}
                        </div>
                        <h3 className="font-semibold text-slate-900 mt-2">{name}</h3>
                        <div className="mt-1 flex items-baseline space-x-1">
                          <span className="text-2xl font-bold text-slate-900">{current}</span>
                          <span className="text-sm text-slate-500">/ {config.min}</span>
                        </div>
                        <ProgressBar current={current} minTarget={config.min} color={config.color} />
                      </div>
                    );
                  })}
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  {/* ADD ENTRY FORM */}
                  <div className="lg:col-span-1 bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-fit">
                    <h3 className="text-lg font-bold text-slate-900 mb-4">Log Activity</h3>
                    <form onSubmit={handleAddEntry} className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Vector</label>
                        <select 
                          value={newVector} 
                          onChange={(e) => setNewVector(e.target.value)}
                          className="w-full rounded-md border border-slate-300 py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 p-2"
                        >
                          {Object.keys(VECTORS).map(v => <option key={v} value={v}>{v}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Activity Notes</label>
                        <input 
                          type="text" 
                          placeholder="e.g., Deep work block"
                          value={newActivity}
                          onChange={(e) => setNewActivity(e.target.value)}
                          className="w-full rounded-md border border-slate-300 py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          required
                        />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Start Time</label>
                          <input 
                            type="time" 
                            value={newStart}
                            onChange={(e) => setNewStart(e.target.value)}
                            className="w-full rounded-md border border-slate-300 py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            required
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">End Time</label>
                          <input 
                            type="time" 
                            value={newEnd}
                            onChange={(e) => setNewEnd(e.target.value)}
                            className="w-full rounded-md border border-slate-300 py-2 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            required
                          />
                        </div>
                      </div>
                      <div className="pt-2">
                        <button 
                          type="submit"
                          className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-md transition-colors flex items-center justify-center space-x-2"
                        >
                          <Plus className="h-4 w-4" />
                          <span>Log Time</span>
                        </button>
                      </div>
                    </form>
                  </div>

                  {/* TODAY'S TIMELINE */}
                  <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                      <h3 className="text-lg font-bold text-slate-900">Today's Timeline</h3>
                      <span className="text-sm font-medium text-slate-500">{todayEntries.length} entries</span>
                    </div>
                    <div className="divide-y divide-slate-100 max-h-[400px] overflow-y-auto">
                      {todayEntries.length === 0 ? (
                        <div className="p-8 text-center text-slate-500">
                          No activities logged today yet.
                        </div>
                      ) : (
                        todayEntries.map(entry => (
                          <div key={entry.id} className="p-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                            <div className="flex items-center space-x-4">
                              <div className={`w-2 h-10 rounded-full ${VECTORS[entry.vector].color}`}></div>
                              <div>
                                <div className="font-medium text-slate-900">{entry.activity}</div>
                                <div className="text-xs text-slate-500 mt-0.5">
                                  {entry.vector} • {entry.startTime} - {entry.endTime}
                                </div>
                              </div>
                            </div>
                            <div className="flex items-center space-x-4">
                              <div className="text-right">
                                <div className="font-bold text-slate-900">+{entry.duration}</div>
                                <div className="text-xs text-slate-400">pts</div>
                              </div>
                              <button 
                                onClick={() => handleDelete(entry.id)}
                                className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors"
                                title="Delete entry"
                              >
                                <Trash2 className="h-4 w-4" />
                              </button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* DAILY LOG VIEW */}
            {activeTab === 'daily' && (
              <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="px-6 py-5 border-b border-slate-200">
                  <h2 className="text-lg font-bold text-slate-900">Daily Log History</h2>
                  <p className="text-sm text-slate-500 mt-1">Your aggregated daily points across all vectors.</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="min-w-full divide-y divide-slate-200">
                    <thead className="bg-slate-50">
                      <tr>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Date</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Creavity</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Network</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Shipping</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Gym</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Journaling</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Total</th>
                        <th className="px-6 py-3 text-center text-xs font-medium text-slate-500 uppercase tracking-wider">Target?</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-slate-200">
                      {dailyTotals.map((day) => (
                        <tr key={day.date} className="hover:bg-slate-50">
                          <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{day.date}</td>
                          <td className={`px-6 py-4 whitespace-nowrap text-sm ${day.Creavity >= VECTORS.Creavity.min ? 'font-bold text-indigo-600' : 'text-slate-500'}`}>{day.Creavity}</td>
                          <td className={`px-6 py-4 whitespace-nowrap text-sm ${day.Network >= VECTORS.Network.min ? 'font-bold text-blue-600' : 'text-slate-500'}`}>{day.Network}</td>
                          <td className={`px-6 py-4 whitespace-nowrap text-sm ${day.Shipping >= VECTORS.Shipping.min ? 'font-bold text-amber-600' : 'text-slate-500'}`}>{day.Shipping}</td>
                          <td className={`px-6 py-4 whitespace-nowrap text-sm ${day.Gym >= VECTORS.Gym.min ? 'font-bold text-rose-600' : 'text-slate-500'}`}>{day.Gym}</td>
                          <td className={`px-6 py-4 whitespace-nowrap text-sm ${day.Journaling >= VECTORS.Journaling.min ? 'font-bold text-purple-600' : 'text-slate-500'}`}>{day.Journaling}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900">{day.Total}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-center">
                            {day.Total >= DAILY_TARGET_MIN ? (
                              <CheckCircle className="h-5 w-5 text-emerald-500 mx-auto" />
                            ) : (
                              <XCircle className="h-5 w-5 text-slate-300 mx-auto" />
                            )}
                          </td>
                        </tr>
                      ))}
                      {dailyTotals.length === 0 && (
                        <tr>
                          <td colSpan="8" className="px-6 py-8 text-center text-slate-500">No daily logs found. Start tracking!</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* WEEKLY SUMMARY VIEW */}
            {activeTab === 'weekly' && (
              <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="px-6 py-5 border-b border-slate-200">
                  <h2 className="text-lg font-bold text-slate-900">Weekly Leaderboard</h2>
                  <p className="text-sm text-slate-500 mt-1">Target: {WEEKLY_TARGET} minutes/points per week.</p>
                </div>
                <div className="overflow-x-auto">
                  <table className="min-w-full divide-y divide-slate-200">
                    <thead className="bg-slate-50">
                      <tr>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Week</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Creavity</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Network</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Shipping</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Gym</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Journaling</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Total</th>
                        <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">vs Last Wk</th>
                        <th className="px-6 py-3 text-center text-xs font-medium text-slate-500 uppercase tracking-wider">Hit 1200?</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-slate-200">
                      {weeklyTotals.map((wk) => (
                        <tr key={wk.week} className="hover:bg-slate-50">
                          <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">Week {wk.week}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{wk.Creavity}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{wk.Network}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{wk.Shipping}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{wk.Gym}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{wk.Journaling}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-900">{wk.Total}</td>
                          <td className="px-6 py-4 whitespace-nowrap text-sm">
                            {wk.vsLast > 0 ? (
                              <span className="text-emerald-600 font-medium">+{wk.vsLast} ({wk.pctChange}%)</span>
                            ) : wk.vsLast < 0 ? (
                              <span className="text-rose-600 font-medium">{wk.vsLast} ({Math.abs(wk.pctChange)}%)</span>
                            ) : (
                              <span className="text-slate-400">—</span>
                            )}
                          </td>
                          <td className="px-6 py-4 whitespace-nowrap text-center">
                            {wk.Total >= WEEKLY_TARGET ? (
                              <CheckCircle className="h-5 w-5 text-emerald-500 mx-auto" />
                            ) : (
                              <XCircle className="h-5 w-5 text-slate-300 mx-auto" />
                            )}
                          </td>
                        </tr>
                      ))}
                      {weeklyTotals.length === 0 && (
                        <tr>
                          <td colSpan="9" className="px-6 py-8 text-center text-slate-500">No weekly data available yet.</td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
