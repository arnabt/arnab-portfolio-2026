<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogananda Teachings Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0F2340;
            --navy-mid: #1B3A6B;
            --gold: #C4944E;
            --gold-light: #D4A574;
            --sky: #7DB3D1;
            --text: #2C3E50;
            --text-muted: #6B7B8D;
            --warm-white: #FAF9F6;
            --cream: #F3F0EA;
            --border: #E0DAD0;
            --success: #27AE60;
            --error: #E74C3C;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.7;
            color: var(--text);
            background: var(--warm-white);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }

        header {
            background: var(--navy);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: var(--gold);
        }

        .back-link {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 400;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--gold-light);
        }

        main {
            padding: 3rem 0;
            min-height: calc(100vh - 200px);
        }

        .quiz-container {
            background: #fff;
            border-radius: 8px;
            padding: 3rem;
            box-shadow: 0 4px 16px rgba(15, 35, 64, 0.08);
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .quiz-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.2rem;
            color: var(--navy);
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .quiz-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        .progress-bar {
            background: var(--cream);
            height: 6px;
            border-radius: 3px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-number {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.3rem;
            color: var(--navy);
            margin-bottom: 2rem;
            font-weight: 500;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option {
            padding: 1.2rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
            text-align: left;
            font-size: 0.95rem;
            color: var(--text);
        }

        .option:hover:not(.disabled) {
            border-color: var(--gold);
            background: rgba(196, 148, 78, 0.04);
        }

        .option.selected {
            border-color: var(--gold);
            background: rgba(196, 148, 78, 0.1);
            color: var(--navy);
            font-weight: 500;
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(39, 174, 96, 0.1);
        }

        .option.incorrect {
            border-color: var(--error);
            background: rgba(231, 76, 60, 0.1);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-feedback {
            display: none;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .option.correct .option-feedback,
        .option.incorrect .option-feedback {
            display: block;
        }

        .option.correct .option-feedback {
            color: var(--success);
        }

        .option.incorrect .option-feedback {
            color: var(--error);
        }

        .explanation {
            background: var(--cream);
            padding: 1.5rem;
            border-radius: 6px;
            margin: 2rem 0;
            border-left: 4px solid var(--gold);
            display: none;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: var(--navy);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.85rem 2.2rem;
            border: none;
            border-radius: 3px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--gold);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #B8873F;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(196, 148, 78, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--navy);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen.show {
            display: block;
        }

        .results-screen.quiz-screen {
            display: none;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .score-number {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 3.5rem;
            font-weight: 400;
            line-height: 1;
        }

        .score-label {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            color: var(--navy);
            margin-bottom: 1rem;
            font-weight: 400;
        }

        .results-message {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .results-details {
            background: var(--cream);
            padding: 2rem;
            border-radius: 6px;
            margin: 2rem 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            text-align: left;
        }

        .results-stat {
            text-align: center;
        }

        .results-stat-number {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: 400;
        }

        .results-stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .hidden {
            display: none;
        }

        footer {
            background: var(--navy);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 2rem;
            font-size: 0.82rem;
            border-top: 1px solid rgba(196, 148, 78, 0.15);
            margin-top: 4rem;
        }

        @media (max-width: 640px) {
            .container {
                padding: 0 1.5rem;
            }

            .quiz-container {
                padding: 1.5rem;
            }

            .quiz-title {
                font-size: 1.6rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .results-details {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
            <div class="logo">Arnab <span>Tagore</span></div>
            <a href="index.html" class="back-link">← Back to Portfolio</a>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Quiz Screen -->
            <div class="quiz-screen" id="quizScreen">
                <div class="quiz-container">
                    <div class="quiz-header">
                        <h1 class="quiz-title">Yogananda Teachings Quiz</h1>
                        <p class="quiz-subtitle">Test your knowledge of Paramahansa Yogananda's spiritual teachings</p>
                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>

                    <div id="questionNumber" class="question-number"></div>
                    <h2 class="question-text" id="questionText"></h2>

                    <div class="options" id="optionsContainer"></div>

                    <div class="explanation" id="explanation"></div>

                    <div class="button-group">
                        <button class="btn btn-primary" id="nextBtn" disabled>Next Question</button>
                    </div>
                </div>
            </div>

            <!-- Results Screen -->
            <div class="results-screen" id="resultsScreen">
                <div class="quiz-container">
                    <div class="score-circle">
                        <div class="score-number" id="finalScore"></div>
                        <div class="score-label">out of <span id="totalQuestions"></span></div>
                    </div>

                    <h1 class="results-title" id="resultsTitle"></h1>
                    <p class="results-message" id="resultsMessage"></p>

                    <div class="results-details">
                        <div class="results-stat">
                            <div class="results-stat-number" id="percentageScore"></div>
                            <div class="results-stat-label">Accuracy</div>
                        </div>
                        <div class="results-stat">
                            <div class="results-stat-number" id="correctCount"></div>
                            <div class="results-stat-label">Questions Correct</div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="location.reload()">Retake Quiz</button>
                        <a href="index.html" class="btn btn-secondary">Return to Portfolio</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Arnab Tagore. Toronto, Canada.</p>
    </footer>

    <script>
        const quizData = [
            {
                question: "What is the central teaching of Paramahansa Yogananda's \"Autobiography of a Yogi\"?",
                options: [
                    "The path to self-realization through meditation and yoga",
                    "How to achieve material wealth and success",
                    "Political revolution and social reform",
                    "The history of Indian politics"
                ],
                correct: 0,
                explanation: "Yogananda's \"Autobiography of a Yogi\" is a spiritual classic that teaches self-realization as the ultimate goal of human existence through meditation, yoga, and devotion to God."
            },
            {
                question: "According to Yogananda, what is the primary purpose of Kriya Yoga?",
                options: [
                    "To build physical strength and flexibility",
                    "To accelerate spiritual evolution and unite the soul with God",
                    "To develop intellectual abilities",
                    "To increase earning potential"
                ],
                correct: 1,
                explanation: "Yogananda taught that Kriya Yoga is an ancient meditation technique that accelerates spiritual progress by harmonizing the body, mind, and soul."
            },
            {
                question: "What did Yogananda teach about the nature of God?",
                options: [
                    "God exists only in churches and temples",
                    "God is impersonal and distant",
                    "God is omnipresent, omnipotent, and can be experienced directly through meditation",
                    "God does not exist"
                ],
                correct: 2,
                explanation: "Yogananda taught that God is an infinite, all-pervading consciousness that exists within every being and can be directly experienced through sincere meditation and spiritual practice."
            },
            {
                question: "What is the concept of \"Self-realization\" according to Yogananda?",
                options: [
                    "Becoming famous and successful",
                    "Understanding one's true divine nature and unity with God",
                    "Achieving material possessions",
                    "Reaching a high position in society"
                ],
                correct: 1,
                explanation: "Self-realization is the direct experiential knowledge of one's true identity as the eternal, divine soul—one with God. It transcends ego and worldly attachments."
            },
            {
                question: "Which ancient scripture did Yogananda frequently reference in his teachings?",
                options: [
                    "The Bible only",
                    "The Quran only",
                    "The Bhagavad Gita and other Hindu scriptures",
                    "Only modern philosophy texts"
                ],
                correct: 2,
                explanation: "Yogananda was deeply rooted in Hindu spirituality and frequently taught from the Bhagavad Gita, Yoga Sutras, and Upanishads, showing their universal spiritual truths."
            },
            {
                question: "What does Yogananda teach about the relationship between mind and body?",
                options: [
                    "They are completely separate entities",
                    "The body controls the mind",
                    "The mind controls the body; thoughts shape reality",
                    "They are unrelated to spiritual growth"
                ],
                correct: 2,
                explanation: "Yogananda taught that the mind is the creator of the body's conditions. Through positive thoughts and meditation, one can heal the body and transform one's reality."
            },
            {
                question: "What is the core purpose of meditation in Yogananda's teachings?",
                options: [
                    "To escape reality",
                    "To contact the divine presence within and experience God's love",
                    "To achieve material success",
                    "To develop supernatural powers"
                ],
                correct: 1,
                explanation: "Meditation in Yogananda's system is a direct means of contacting the presence of God within, experiencing divine love, and achieving inner peace and spiritual insight."
            },
            {
                question: "How did Yogananda describe the nature of ego?",
                options: [
                    "Ego is a sign of strength and self-respect",
                    "Ego is an illusion that separates us from God and causes suffering",
                    "Ego is essential for survival",
                    "Ego is the same as having healthy self-esteem"
                ],
                correct: 1,
                explanation: "Yogananda taught that the ego or false sense of separate self is the root cause of ignorance and suffering. Transcending ego through meditation leads to unity with God."
            },
            {
                question: "What principle did Yogananda emphasize regarding service and devotion?",
                options: [
                    "Service to others is a burden to avoid",
                    "Only personal spiritual practice matters",
                    "Service to others is service to God; love through action is devotion",
                    "Financial success is the highest form of devotion"
                ],
                correct: 2,
                explanation: "Yogananda taught that selfless service and love in action are pathways to God. Serving others with love is serving the divine in all beings."
            },
            {
                question: "According to Yogananda, what is the relationship between all religions?",
                options: [
                    "Only one religion is true",
                    "All religions are false",
                    "All true religions lead to the same God-realization; they are different paths up the same mountain",
                    "Religions are only for historical purposes"
                ],
                correct: 2,
                explanation: "Yogananda was a bridge between East and West, teaching that all sincere spiritual paths lead to the same ultimate reality—the experience of God's presence and unity with all life."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;
        let answeredQuestions = 0;

        function startQuiz() {
            displayQuestion();
        }

        function displayQuestion() {
            const question = quizData[currentQuestion];
            const quizScreen = document.getElementById('quizScreen');
            const resultsScreen = document.getElementById('resultsScreen');

            quizScreen.classList.remove('hidden');
            resultsScreen.classList.remove('show');

            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
            document.getElementById('questionText').textContent = question.question;

            const progressPercent = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progressPercent + '%';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.addEventListener('click', () => selectAnswer(index));
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('explanation').classList.remove('show');
            document.getElementById('nextBtn').disabled = true;
            selectedAnswer = null;
        }

        function selectAnswer(index) {
            if (selectedAnswer !== null) return;

            selectedAnswer = index;
            const options = document.querySelectorAll('.option');
            const question = quizData[currentQuestion];

            options.forEach((option, i) => {
                option.classList.add('disabled');
                if (i === question.correct) {
                    option.classList.add('correct');
                    option.innerHTML += '<div class="option-feedback">✓ Correct</div>';
                } else if (i === index && index !== question.correct) {
                    option.classList.add('incorrect');
                    option.innerHTML += '<div class="option-feedback">✗ Incorrect</div>';
                }
            });

            if (index === question.correct) {
                score++;
            }
            answeredQuestions++;

            document.getElementById('explanation').textContent = question.explanation;
            document.getElementById('explanation').classList.add('show');
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                displayQuestion();
            } else {
                displayResults();
            }
        }

        function displayResults() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = Math.round((score / quizData.length) * 100);
            const totalQuestions = quizData.length;

            document.getElementById('finalScore').textContent = score;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('percentageScore').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = score;

            let title = '';
            let message = '';

            if (percentage === 100) {
                title = 'Perfect Score!';
                message = 'You have mastered the teachings of Yogananda. Your dedication to understanding his wisdom is truly commendable.';
            } else if (percentage >= 80) {
                title = 'Excellent Understanding';
                message = 'You demonstrate a strong grasp of Yogananda\'s core teachings. Continue to deepen your spiritual practice.';
            } else if (percentage >= 60) {
                title = 'Good Progress';
                message = 'You have a solid foundation in Yogananda\'s teachings. Reflect on the areas where you can deepen your knowledge.';
            } else if (percentage >= 40) {
                title = 'Keep Learning';
                message = 'You\'re on your spiritual journey. Explore Yogananda\'s "Autobiography of a Yogi" and his teachings more deeply.';
            } else {
                title = 'Just Beginning';
                message = 'Your spiritual quest is just starting. I encourage you to study Yogananda\'s wisdom with an open heart.';
            }

            document.getElementById('resultsTitle').textContent = title;
            document.getElementById('resultsMessage').textContent = message;
        }

        document.getElementById('nextBtn').addEventListener('click', nextQuestion);

        startQuiz();
    </script>

</body>

</html>
